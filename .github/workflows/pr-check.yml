name: PR Verification

on:
  pull_request:
    branches: ["website-changes"]

jobs:
  verify:
    name: Build & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Check for Typos (CSpell)
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: "src/**/*.{js,jsx,ts,tsx,css,json,md}"
        continue-on-error: true

      - name: Build Project
        run: npm run build
